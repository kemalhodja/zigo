<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7C3AED" />
    <title>Zigo mobile setup</title>
    <style>
      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 0%, rgb(236 72 153 / 0.22), transparent 18rem),
          radial-gradient(circle at 88% 10%, rgb(6 182 212 / 0.18), transparent 18rem),
          linear-gradient(180deg, #fff7fb, #f8fbff);
        color: #101828;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(24rem, calc(100% - 2rem));
        text-align: center;
      }
      .logo {
        width: 5rem;
        height: 5rem;
        margin: 0 auto 1rem;
        display: grid;
        place-items: center;
        border-radius: 1.25rem;
        background: linear-gradient(135deg, #7c3aed, #ec4899, #06b6d4);
        color: white;
        font-size: 2rem;
        font-weight: 900;
      }
      h1 {
        margin: 0;
        font-size: 1.45rem;
      }
      p {
        margin: 0.7rem 0 0;
        color: #667085;
        line-height: 1.6;
      }
      code {
        display: inline-block;
        margin-top: 1rem;
        border-radius: 0.75rem;
        background: white;
        padding: 0.75rem;
        color: #7c3aed;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">Z</div>
      <h1>Connect the mobile app</h1>
      <p>Build the APK with a hosted Zigo URL so Android can open the live Next.js app.</p>
      <code>CAPACITOR_SERVER_URL=https://your-zigo-domain.example</code>
    </main>
  </body>
</html>
