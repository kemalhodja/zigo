name: Live integration (nightly)

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations and seed
        run: supabase db reset --local

      - name: Write local env for probes
        run: |
          eval "$(supabase status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3005" >> $GITHUB_ENV
          echo "E2E_BASE_URL=http://127.0.0.1:3005" >> $GITHUB_ENV
          echo "ZIGO_RUN_LIVE_TESTS=1" >> $GITHUB_ENV
          echo "ZIGO_BILLING_DEV_BYPASS=true" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_ZIGO_BILLING_DEV_BYPASS=true" >> $GITHUB_ENV

      - name: Production build
        run: npm run build:safe

      - name: Start app server
        run: npm run start -- -p 3005 &
        env:
          E2E_BASE_URL: http://127.0.0.1:3005

      - name: Wait for health API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3005/api/setup/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready"
          exit 1

      - name: Live integration suite
        run: npm run test:live:all
        env:
          E2E_BASE_URL: http://127.0.0.1:3005
          ZIGO_RUN_LIVE_TESTS: "1"
